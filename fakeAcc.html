<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ig-bg: #fafafa;
    --ig-white: #ffffff;
    --ig-border: #dbdbdb;
    --ig-text: #262626;
    --ig-muted: #8e8e8e;
    --ig-blue: #0095f6;
    --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    --font: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--ig-bg);
    min-height: 100vh;
    color: var(--ig-text);
  }

  /* ─── NAV ─── */
  .ig-nav {
    background: var(--ig-white);
    border-bottom: 1px solid var(--ig-border);
    padding: 0 20px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .ig-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    color: var(--ig-text);
    letter-spacing: -0.5px;
    user-select: none;
  }
  .ig-nav-icons {
    display: flex;
    gap: 16px;
    font-size: 22px;
    cursor: pointer;
    color: var(--ig-text);
  }

  /* ─── PROFILE HEADER ─── */
  .ig-profile {
    background: var(--ig-white);
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--ig-border);
    max-width: 935px;
    margin: 0 auto;
    width: 100%;
  }
  .ig-profile-top {
    display: flex;
    align-items: flex-start;
    gap: 32px;
    margin-bottom: 20px;
  }

  /* ── PROFILE PICTURE ──
     Replace the letter "E" fallback with an <img> tag.
     Recommended size: 150×150 px, circular crop handled by CSS.
     Place your image at: assets/profile/avatar.jpg
  */
  .ig-avatar-ring {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    padding: 3px;
    background: var(--ig-gradient);
    flex-shrink: 0;
  }
  .ig-avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid var(--ig-white);
    background: #fde8d0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 600;
    color: #8b4513;
    overflow: hidden;
  }
  .ig-avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  .ig-profile-info { flex: 1; min-width: 0; }
  .ig-username-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .ig-username { font-size: 20px; font-weight: 400; }
  .ig-btn {
    border: 1px solid var(--ig-border);
    background: var(--ig-white);
    border-radius: 8px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    color: var(--ig-text);
  }
  .ig-btn.primary {
    background: var(--ig-blue);
    border-color: var(--ig-blue);
    color: #fff;
  }
  .ig-stats {
    display: flex;
    gap: 32px;
    margin-bottom: 14px;
  }
  .ig-stat strong { display: block; font-size: 16px; font-weight: 600; }
  .ig-stat span { font-size: 14px; color: var(--ig-text); }
  .ig-bio-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .ig-bio-text { font-size: 14px; line-height: 1.55; }
  .ig-bio-text .clue { }

  /* ─── HIGHLIGHTS ─── */
  .ig-highlights-wrap {
    background: var(--ig-white);
    border-bottom: 1px solid var(--ig-border);
  }
  .ig-highlights {
    max-width: 935px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    gap: 22px;
    overflow-x: auto;
  }
  .ig-highlights::-webkit-scrollbar { display: none; }
  .ig-highlight { text-align: center; flex-shrink: 0; cursor: pointer; }
  .ig-highlight-ring {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid var(--ig-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin: 0 auto 5px;
    background: #f9f9f9;
    overflow: hidden;
  }
  /* ── HIGHLIGHT COVER IMAGES (optional) ──
     Recommended size: 60×60 px
     To use a real photo instead of the emoji, replace the emoji span
     inside each .ig-highlight-ring with: <img src="assets/highlights/NAME.jpg" …>
  */
  .ig-highlight span { font-size: 12px; color: var(--ig-text); }

  /* ─── TABS ─── */
  .ig-tabs-wrap {
    background: var(--ig-white);
    border-bottom: 1px solid var(--ig-border);
  }
  .ig-tabs {
    max-width: 935px;
    margin: 0 auto;
    display: flex;
  }
  .ig-tab {
    flex: 1;
    text-align: center;
    padding: 13px 0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--ig-muted);
    border-top: 1px solid transparent;
    cursor: pointer;
    transition: color 0.15s;
  }
  .ig-tab.active {
    color: var(--ig-text);
    border-top-color: var(--ig-text);
  }

  /* ─── GRID ─── */
  .ig-grid-wrap {
    max-width: 935px;
    margin: 0 auto;
  }
  .ig-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    background: var(--ig-border);
  }

  /*
  ══════════════════════════════════════════════════════
  POST THUMBNAIL IMAGES
  ══════════════════════════════════════════════════════
  Each post cell is a 1:1 square (aspect-ratio: 1).
  The .post-img inside fills it completely via object-fit: cover.

  Recommended image size: 300×300 px minimum (square)
  Format: JPG or PNG
  File paths: assets/posts/<filename>.jpg

  To add your image:
    1. Place your photo in assets/posts/
    2. Find the post's <img class="post-img"> tag below
    3. Set the src attribute: src="assets/posts/birthday.jpg"
    4. Remove or keep the fallback emoji <span> as a backup

  CLUE POSTS: ids 1, 2, 8 — the personal info lives naturally inside
  the captions and comments as plain text, just like a real profile.
  ══════════════════════════════════════════════════════
  */

  .ig-post {
    aspect-ratio: 1;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    background: #e9e9e9;
  }
  .post-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    position: absolute;
    inset: 0;
  }
  /* Fallback emoji shown only when no image is loaded */
  .post-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    z-index: 1;
  }
  /* When a real img loads, it sits above the fallback */
  .post-img:not([src=""]):not([src]) { z-index: 2; }



  /* Hover overlay */
  .post-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s, background 0.2s;
    z-index: 6;
  }
  .ig-post:hover .post-overlay {
    opacity: 1;
    background: rgba(0,0,0,0.42);
  }
  .post-overlay span { display: flex; align-items: center; gap: 5px; }

  /* ─── MODAL ─── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }

  .modal-close {
    position: fixed;
    top: 18px;
    right: 20px;
    background: none;
    border: none;
    color: #fff;
    font-size: 30px;
    cursor: pointer;
    z-index: 201;
    line-height: 1;
  }

  .modal {
    background: var(--ig-white);
    border-radius: 4px;
    display: flex;
    max-width: 900px;
    width: 94vw;
    max-height: 90vh;
    overflow: hidden;
  }

  /*
  ══════════════════════════════════════════════════════
  MODAL LARGE IMAGE
  ══════════════════════════════════════════════════════
  The left half of the modal shows the full post image.
  Recommended size: 600×600 px (square or portrait)
  Same file as the thumbnail — no separate image needed.
  ══════════════════════════════════════════════════════
  */
  .modal-img-wrap {
    width: 52%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    min-height: 420px;
    position: relative;
    overflow: hidden;
  }
  .modal-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    position: absolute;
    inset: 0;
  }
  .modal-img-fallback {
    font-size: 72px;
    z-index: 1;
  }

  .modal-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .modal-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--ig-border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .modal-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--ig-gradient);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
    overflow: hidden;
  }
  .modal-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .modal-header-name { font-size: 13px; font-weight: 600; }
  .modal-header-loc { font-size: 12px; color: var(--ig-muted); }
  .modal-more { margin-left: auto; font-size: 20px; cursor: pointer; color: var(--ig-text); }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }
  .modal-caption {
    font-size: 14px;
    line-height: 1.55;
    margin-bottom: 16px;
    color: var(--ig-text);
  }
  .modal-caption strong { font-weight: 600; margin-right: 5px; }
  .modal-caption .clue-tag {
    /* clue words styled as plain text — no highlight */
  }
  .modal-comment {
    font-size: 13.5px;
    margin-bottom: 10px;
    line-height: 1.45;
    color: var(--ig-text);
  }
  .modal-comment strong { font-weight: 600; margin-right: 4px; }
  .modal-comment span { color: var(--ig-muted); font-size: 11px; margin-left: 8px; }

  .modal-footer {
    border-top: 1px solid var(--ig-border);
    padding: 10px 16px;
    flex-shrink: 0;
  }
  .modal-actions { display: flex; gap: 14px; font-size: 23px; margin-bottom: 8px; cursor: pointer; }
  .modal-likes { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .modal-date { font-size: 11px; color: var(--ig-muted); text-transform: uppercase; letter-spacing: 0.04em; }


</style>

/* ─── BUILD GRID ─── */
const grid = document.getElementById("grid");

posts.forEach((post, idx) => {
  const cell = document.createElement("div");
  cell.className = "ig-post";
  cell.setAttribute("aria-label", "Open post " + (idx + 1));
  cell.setAttribute("role", "button");
  cell.setAttribute("tabindex", "0");

  // Empty cell — image will fill this when src is set
  cell.innerHTML = `<div class="post-fallback"></div>`;

  // Real image (sits above fallback when src is provided)
  if (post.img) {
    const img = document.createElement("img");
    img.className = "post-img";
    img.src = post.img;
    img.alt = "Post " + (idx + 1);
    cell.appendChild(img);
  }

  // Hover overlay
  const overlay = document.createElement("div");
  overlay.className = "post-overlay";
  overlay.innerHTML = `<span>❤️ ${parseInt(post.likes)}</span><span>💬 ${post.comments.length}</span>`;
  cell.appendChild(overlay);

  cell.addEventListener("click", () => openPost(idx));
  cell.addEventListener("keydown", e => { if (e.key === "Enter") openPost(idx); });

  grid.appendChild(cell);
});

/* ─── MODAL LOGIC ─── */
function openPost(idx) {
  const p = posts[idx];
  const backdrop = document.getElementById("modal-backdrop");
  const imgWrap  = document.getElementById("modal-img-wrap");

  // Clear previous image
  const prevImg = imgWrap.querySelector("img");
  if (prevImg) prevImg.remove();

  // Set modal image
  if (p.img) {
    const img = document.createElement("img");
    img.src = p.img;
    img.alt = "Post image";
    imgWrap.appendChild(img);
    document.getElementById("modal-fallback").style.display = "none";
  } else {
    document.getElementById("modal-fallback").textContent = "";
    document.getElementById("modal-fallback").style.display = "none";
    imgWrap.style.background = "#e9e9e9";
  }

  document.getElementById("modal-loc").textContent      = p.location;
  document.getElementById("modal-caption").innerHTML    = p.caption;
  document.getElementById("modal-likes").textContent    = p.likes;
  document.getElementById("modal-date").textContent     = p.date;

  // Comments
  const commentsEl = document.getElementById("modal-comments");
  commentsEl.innerHTML = p.comments.map(c =>
    `<div class="modal-comment"><strong>${c.user}</strong>${c.text}<span>${c.time}</span></div>`
  ).join("");

  backdrop.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-backdrop").classList.remove("open");
  document.body.style.overflow = "";
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById("modal-backdrop")) closeModal();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});
